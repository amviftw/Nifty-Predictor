name: Daily Nifty Prediction

on:
  schedule:
    - cron: '35 3 * * 1-5'   # 9:05 AM IST (UTC+5:30), Mon–Fri
  workflow_dispatch:           # allows manual trigger

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backfill data
        run: python -m scripts.backfill_data

      - name: Train models
        run: python -m scripts.train_models

      - name: Run prediction
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python -m scripts.daily_predict --email

      - name: Commit updated DB and signals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add storage/ || true
          git diff --staged --quiet || git commit -m "chore: daily prediction $(date -u +%Y-%m-%d)"
          git push
